<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Книжный клуб для фронтендеров: читаем техническую литературу по главам, разбираем на встречах, закрепляем карточками." />
    <meta name="theme-color" content="#faf9f6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=Golos+Text:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Книжный клуб</title>
    <script>
      // Тема до отрисовки, чтобы не мигало: localStorage или системная.
      const saved = localStorage.getItem('theme')
      if (
        saved === 'dark' ||
        (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
